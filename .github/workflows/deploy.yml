name: CI/CD Alumni Platform
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Connected to EC2"
            whoami
            pwd

            cd ~/alumni-platform

            echo "Pulling latest code"
            git pull origin main

            cd backend

            echo "Checking Python"
            python3 --version

            echo "Creating venv if missing"
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            echo "Activating venv"
            source venv/bin/activate

            echo "Installing dependencies"
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "Stopping old uvicorn process"
            pkill -f "uvicorn main:app" || true

            echo "Starting backend"
            nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &

            sleep 3

            echo "Checking app log"
            cat app.log || true

            echo "Checking running process"
            pgrep -af uvicorn || true

            echo "Deploy done"
