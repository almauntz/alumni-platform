name: CI/CD Alumni Platform
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Connected to EC2"
            whoami
            pwd

            cd ~/alumni-platform

            echo "Pulling latest code"
            git pull origin main

            cd backend

            echo "Checking Python"
            python3 --version

            echo "Creating venv if missing"
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            echo "Activating venv"
            source venv/bin/activate

            echo "Installing dependencies"
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "Stopping old backend process"

            if [ -f app.pid ]; then
              OLD_PID=$(cat app.pid)

              if ps -p $OLD_PID > /dev/null 2>&1; then
                echo "Stopping process $OLD_PID"
                kill $OLD_PID || true
                sleep 2
              else
                echo "Old PID file exists, but process is not running"
              fi

              rm -f app.pid
            else
              echo "No old PID file found"
            fi

            echo "Starting backend"
            nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &

            echo $! > app.pid

            sleep 3

            echo "Started process:"
            cat app.pid

            echo "App log:"
            cat app.log || true

            echo "Deploy done"
